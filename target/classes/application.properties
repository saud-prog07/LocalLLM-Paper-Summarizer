server.port=8080

# Claude API key - set this before running
# You can also set it as an environment variable: CLAUDE_API_KEY=sk-ant-...
claude.api.key=${CLAUDE_API_KEY:your-api-key-here}

# Allow uploading large PDFs (up to 20MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
