<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Summary - Paper Summarizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #333;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.7rem;
            color: #1a202c;
            margin-bottom: 6px;
        }

        .meta {
            color: #888;
            font-size: 0.83rem;
            margin-bottom: 28px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 28px 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            margin-bottom: 20px;
            white-space: pre-wrap;
            line-height: 1.75;
            font-size: 0.93rem;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 28px;
            padding: 8px 18px;
            background: #4299e1;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .back-btn:hover { background: #3182ce; }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat {
            background: white;
            border-radius: 10px;
            padding: 14px 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            text-align: center;
            flex: 1;
            min-width: 110px;
        }

        .stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4299e1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">

        <a href="/" class="back-btn">← Summarize another paper</a>

        <h1 th:text="${title}">Summary</h1>
        <p class="meta" th:text="'File: ' + ${fileName}"></p>

        <!-- quick stats -->
        <div class="stats">
            <div class="stat">
                <div class="stat-num" th:text="${pages}">0</div>
                <div class="stat-label">Pages</div>
            </div>
            <div class="stat">
                <div class="stat-num" th:text="${chunks}">0</div>
                <div class="stat-label">Chunks processed</div>
            </div>
            <div class="stat">
                <div class="stat-num" th:text="${timeTaken} + 's'">0s</div>
                <div class="stat-label">Time taken</div>
            </div>
        </div>

        <!-- the actual summary -->
        <div class="card" th:text="${summary}">
            Summary goes here...
        </div>

    </div>
</body>
</html>
